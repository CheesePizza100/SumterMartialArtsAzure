name: Deploy Frontend to Azure Static Web Apps
on:
  push:
    branches:
      - master
    paths:
      - 'sumtermartialartsazure.client/**'
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: sumtermartialartsazure.client/package-lock.json

    - name: Install dependencies
      working-directory: sumtermartialartsazure.client
      run: npm ci

    - name: Run tests
      working-directory: sumtermartialartsazure.client
      run: npx ng test --watch=false --browsers=ChromeHeadless

    - name: Build And Deploy
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: 'upload'
        app_location: 'sumtermartialartsazure.client'
        api_location: ''
        output_location: 'dist/sumtermartialartsazure.client/browser'
